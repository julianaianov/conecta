name: conecta_app
description: Conecta — plataforma de impacto social local
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # HTTP client
  dio: ^5.4.3

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Navigation
  go_router: ^14.2.7

  # Maps (OpenStreetMap — sem necessidade de API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # UI helpers
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
